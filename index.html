<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Amiri', serif; background: #F8F9FA; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .quote { background: #F3EEF5; padding: 15px; border-radius: 15px; margin: 15px 0; font-style: italic; color: #4A354F; }
        .wird-box { background: #93679A; color: white; padding: 20px; border-radius: 20px; font-size: 1.3rem; margin: 15px 0; }
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: #93679A; margin-bottom: 10px; }
        button { background: #D4AF37; color: white; width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1.2rem; cursor: pointer; }
        .hero { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ترتيلا 🌟</h1>
        <p>تحت إشراف المعلمة بسنت أحمد</p>
        <div class="quote">"يا بطل، وردك اليومي نورٌ في قلبك.. دُمتَ ملتزماً ليحبك الله ويرفع قدرك" 🌿</div>
        <div id="wirdDisplay" class="wird-box">جارٍ جلب الورد...</div>
        <div class="stats-bar"><span>الالتزام: 0 يوم ✨</span> <span>النقاط: 0 XP 💎</span></div>
        <input type="text" id="studentName" placeholder="اكتب اسم البطل..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:10px;">
        <button onclick="sendData()">تم الإنجاز ✅</button>
        <h3>لوحة الأبطال 🏆</h3>
        <div id="list"></div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwfc57rz3yAXb0GnsSudFNZ_3oCkjIc94W8IVzpCOFNARTE04cKh6W7CEk5UT0BlVht/exec';

    async function loadData() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        document.getElementById('wirdDisplay').innerText = data.wirdText;
        document.getElementById('list').innerHTML = data.leaderboard.map((item, i) => {
            let badge = i==0?'🥇':i==1?'🥈':i==2?'🥉':(i+1)+'#';
            let msg = i==0?'خاتم للقرآن الكريم💎':i==1?'حافظ متميز👑':'بطل ملتزم⭐';
            return `<div class="hero"><span>${badge} ${item.name}</span><span style="font-size:0.8rem; color:#D4AF37">${msg} (${item.days} أيام)</span></div>`;
        }).join('');
    }

    async function sendData() {
        const name = document.getElementById('studentName').value;
        if(!name) return alert("اكتب الاسم!");
        await fetch(`${scriptURL}?name=${encodeURIComponent(name)}`);
        alert("تقبل الله منك يا بطل!");
        loadData();
    }
    window.onload = loadData;
</script>
</body>
</html>
