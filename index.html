<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترتيلا - لوحة أبطال القرآن 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --purple-main: #93679A; --purple-light: #F3EEF5; --gold: #D4AF37; --text-dark: #4A354F; --mint: #E2F0CB; --pastel-pink: #FFF0F5; }
        body { background: linear-gradient(125deg, var(--pastel-pink), var(--purple-light), var(--baby-blue), #E6E6FA); font-family: 'Cairo', sans-serif; padding: 20px; text-align: center; color: var(--text-dark); margin: 0; min-height: 100vh; }
        .header-container { max-width: 440px; margin: 0 auto 20px auto; background: rgba(255, 255, 255, 0.9); padding: 25px 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(147, 103, 154, 0.05); border: 2px solid rgba(255, 255, 255, 0.6); }
        .main-title { font-family: 'Reem Kufi', sans-serif; font-size: 3.2rem; color: var(--purple-main); margin: 5px 0; display: flex; justify-content: center; gap: 12px; }
        .card, .leaderboard { background: rgba(255, 255, 255, 0.92); padding: 25px; border-radius: 30px; border: 3px solid var(--purple-light); max-width: 440px; margin: 20px auto; box-shadow: 0 15px 35px rgba(147, 103, 154, 0.08); }
        .wird-box { background: linear-gradient(135deg, var(--purple-main), #b38cb9); padding: 20px; border-radius: 20px; color: white; font-weight: bold; margin: 20px 0; font-size: 1.35rem; }
        input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--purple-light); margin-bottom: 15px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #D4AF37, #AA7C11); border: none; padding: 15px; border-radius: 50px; color: white; font-size: 1.2rem; width: 100%; cursor: pointer; }
        .student-item { display: flex; justify-content: space-between; padding: 14px 10px; border-bottom: 1px solid var(--purple-light); }
        .badge-tag { background: var(--mint); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="main-title">تَرْتِيلَا</h1>
        <div style="color:var(--purple-main)">تحت إشراف المعلمة بسنت أحمد</div>
    </div>

    <div class="card">
        <h2>ورد اليوم 🌟</h2>
        <div class="wird-box" id="wirdDisplay">جاري سحب الورد...</div>
        <input type="text" id="studentName" placeholder="اكتب اسمك يا بطل">
        <button id="submitBtn" onclick="sendData()">تم الإنجاز ✅</button>
    </div>

    <div class="leaderboard">
        <h3>لوحة الأبطال 🏆</h3>
        <div id="list">تحميل قائمة الأبطال...</div>
    </div>

<script>
    // رابط السكربت الخاص بكِ
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz_ogd_t7MWB02_WEHlwBPRVZmwdWFNdFqS_8W6Tc_2937G2Joaw07soYRmGgoAOdJX/exec';

    async function loadData() {
        try {
            const response = await fetch(scriptURL + '?nocache=' + new Date().getTime());
            const data = await response.json();
            document.getElementById('wirdDisplay').innerText = data.wirdText || "اكتبي الورد في الشيت";
            const listDiv = document.getElementById('list');
            if (!data.leaderboard || data.leaderboard.length === 0) {
                listDiv.innerHTML = "كن أول بطل اليوم! ✨";
            } else {
                listDiv.innerHTML = data.leaderboard.map((name, index) => 
                    `<div class="student-item"><span>${index + 1}# ${name}</span><span class="badge-tag">بطل ⭐</span></div>`).join('');
            }
        } catch (e) { document.getElementById('list').innerHTML = "حدث خطأ في الاتصال"; }
    }

    async function sendData() {
        const name = document.getElementById('studentName').value.trim();
        if (!name) return alert("اكتب اسمك أولاً!");

        document.getElementById('submitBtn').disabled = true;
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        // التعديل الجوهري: نرسل الاسم فقط لتنظيف اللوحة
        const finalURL = `${scriptURL}?name=${encodeURIComponent(name)}`;

        try {
            await fetch(finalURL, { method: 'GET', mode: 'no-cors' });
            alert("تم تسجيل إنجازك يا بطل!");
            document.getElementById('studentName').value = '';
            setTimeout(loadData, 1500);
        } catch (e) { alert("تم الإرسال!"); }
        document.getElementById('submitBtn').disabled = false;
    }

    window.onload = loadData;
</script>
</body>
</html>
