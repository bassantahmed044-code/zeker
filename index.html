<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ترتيلا - لوحة أبطال القرآن 🌟</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .wird { background: #93679A; color: white; padding: 15px; border-radius: 15px; margin: 15px 0; font-weight: bold; font-size: 1.2rem; }
        .stats { display: flex; justify-content: space-around; margin: 10px 0; font-weight: bold; color: #93679A; }
        .student-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .badge { background: #E2F0CB; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>تَرْتِيلَا 🌟</h1>
        <p>تحت إشراف المعلمة بسنت أحمد</p>
        <div class="wird" id="wirdDisplay">جاري سحب الورد...</div>
        <div class="stats"><span>الالتزام: 0 يوم</span> <span>النقاط: 0 XP</span></div>
        <input type="text" id="studentName" placeholder="اكتب اسمك يا بطل">
        <button id="submitBtn" onclick="sendData()" style="width:100%; padding:10px; background:#D4AF37; color:white; border:none; border-radius:10px; cursor:pointer;">تم الإنجاز ✅</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>لوحة الأبطال 🏆</h3>
        <div id="list">تحميل...</div>
    </div>

<script>
    const scriptURL =https://script.google.com/macros/s/AKfycbxUY59f2H93zSSCS6K8Fiy7_IKnFugG4LAHA7Y1tjx8D2swWSLR4tWduj82hgeT_Gsz/exec;

    async function loadData() {
        const res = await fetch(scriptURL + '?nocache=' + new Date().getTime());
        const data = await res.json();
        document.getElementById('wirdDisplay').innerText = data.wirdText || "اكتبي الورد في B1";
        
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = data.leaderboard.map((name, i) => `
            <div class="student-item">
                <span>${i==0?'🥇':i==1?'🥈':i==2?'🥉':(i+1)+'#'} ${name}</span>
                <span class="badge">${i==0?'بطل ماسي💎':i==1?'حافظ محترف👑':'بطل ملتزم⭐'}</span>
            </div>`).join('');
    }

    async function sendData() {
        const name = document.getElementById('studentName').value.trim();
        if (!name) return alert("اكتب اسمك!");
        
        confetti();
        await fetch(`${scriptURL}?name=${encodeURIComponent(name)}`, { method: 'GET', mode: 'no-cors' });
        alert("تم تسجيل إنجازك يا بطل!");
        setTimeout(loadData, 1000);
    }
    window.onload = loadData;
</script>
</body>
</html>
