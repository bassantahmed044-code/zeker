<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Amiri', serif; background: #F8F9FA; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-family: 'Reem Kufi', sans-serif; color: #93679A; }
        .wird-box { background: #93679A; color: white; padding: 20px; border-radius: 20px; margin: 20px 0; font-size: 1.3rem; }
        .stats-bar { display: flex; justify-content: space-around; margin: 15px 0; color: #4A354F; font-weight: bold; }
        input { width: 100%; padding: 15px; border: 2px solid #EEE; border-radius: 15px; margin-bottom: 10px; }
        button { background: #D4AF37; color: white; width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ترتيلا</h1>
        <p>تحت إشراف المعلمة بسنت أحمد</p>
        <div id="wirdDisplay" class="wird-box">جارٍ جلب الورد...</div>
        <div class="stats-bar"><span>الالتزام: 0 يوم</span> <span>النقاط: 0 XP</span></div>
        <input type="text" id="studentName" placeholder="اكتب اسم البطل هنا...">
        <button onclick="sendData()">تم الإنجاز ✅</button>
        <h3>لوحة الأبطال 🏆</h3>
        <div id="list"></div>
    </div>

<script>
    const scriptURL = https://script.google.com/macros/s/AKfycbxxAbyAOQ-vTXimnxns475iZ93H8-KoKZaqwk46rcj-U1V9pa-jblNaGFiwDT9IZqTy/exec;

    async function loadData() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        document.getElementById('wirdDisplay').innerText = data.wirdText;
        document.getElementById('list').innerHTML = data.leaderboard.map(n => `<div>${n}</div>`).join('');
    }

    async function sendData() {
        const name = document.getElementById('studentName').value;
        await fetch(`${scriptURL}?name=${encodeURIComponent(name)}`);
        alert("تقبل الله منك!");
        loadData();
    }
    window.onload = loadData;
</script>
</body>
</html>
